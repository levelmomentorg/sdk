# Publish — Level Moment SDK packages to npm (@levelmoment)
#
# Publishes the @levelmoment/* SDK packages to npm via TRUSTED PUBLISHING (OIDC):
# no long-lived npm token. GitHub Actions mints a short-lived OIDC identity, npm
# verifies it against the trusted publisher configured for each package, and the
# publish proceeds. Provenance is generated automatically (no --provenance flag).
#
# DORMANT until explicitly triggered — no `push: branches:` trigger, so ordinary
# pushes to `main` never publish. It runs only when:
#   1. an `sdk-v*` tag is pushed (e.g. `git tag sdk-v0.1.0 && git push origin sdk-v0.1.0`), or
#   2. it is started manually via the "Run workflow" button (workflow_dispatch).
#
# One-time setup (per package, on npmjs.com → package → Settings → Trusted
# Publisher): organization/user = levelmomentorg, repository = sdk, workflow =
# publish.yml (no environment). Do this for @levelmoment/sdk-core, sdk-web, and
# sdk-react-native. OIDC needs npm >= 11.5.1, so the workflow upgrades npm first.
#
# To cut a release: bump the version in each sdk/<pkg>/package.json (keep the
# `^x.y.z` cross-dependency in web/react-native in step with sdk-core), then
# push an `sdk-v<version>` tag.

name: Publish — SDK packages

on:
  workflow_dispatch:
  push:
    tags:
      - "sdk-v*"

# Declared at the WORKFLOW (top) level, not per-job: a job-level id-token grant
# was observed to be dropped at runtime (the run received only the workflow-level
# permissions). Top-level is also the standard OIDC pattern.
permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing (+ provenance)

jobs:
  publish:
    name: Publish @levelmoment/sdk-* to npm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Probe: is the OIDC id-token actually reachable in this run? The request
      # URL env var is present ONLY when id-token: write was granted. This
      # disambiguates "org strips id-token" from "npm trusted-publisher config".
      - name: Probe OIDC availability
        run: |
          if [ -n "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
            echo "OIDC_PROBE: id-token AVAILABLE"
          else
            echo "OIDC_PROBE: id-token MISSING — not granted to this run"
          fi

      # NOTE: do NOT set `registry-url` here. It makes setup-node write an
      # .npmrc with `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}`; with
      # the token removed that becomes an empty token, so npm attempts token auth
      # and never falls back to OIDC (E404). npm defaults to the npmjs registry.
      - uses: actions/setup-node@v4
        with:
          node-version: 24 # ships npm 11.x natively (OIDC needs >= 11.5.1)

      # Belt-and-suspenders + surface the versions in the log so an OIDC failure
      # can be diagnosed (too-old npm vs trusted-publisher mismatch).
      - name: Ensure recent npm for OIDC
        run: |
          npm install -g npm@latest
          node --version
          npm --version

      # No lockfile is committed to this repo, so use `npm install` (not `npm ci`).
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      # Ordered build: sdk-core first so its dist/types exist before web and
      # react-native build against the `@levelmoment/sdk-core` workspace symlink.
      - name: Build SDK packages
        run: npm run build

      # Publish in dependency order: sdk-core first so the ^x.y.z cross-dependency
      # in sdk-web and sdk-react-native resolves against a registry-published version.
      # No NODE_AUTH_TOKEN and no --provenance: trusted publishing handles auth via
      # OIDC and attaches provenance automatically.
      - name: Publish @levelmoment/sdk-core
        run: npm publish -w sdk/core --access public --loglevel verbose

      - name: Publish @levelmoment/sdk-web
        run: npm publish -w sdk/web --access public

      - name: Publish @levelmoment/sdk-react-native
        run: npm publish -w sdk/react-native --access public
